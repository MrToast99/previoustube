name: Build with ESP-IDF
on:
  workflow_dispatch:
    inputs:
      esp_idf_version:
        description: 'ESP-IDF version'
        required: false
        default: 'v5.2'
        type: string
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Remove stale dependency lock and cached components
        run: |
          rm -f dependencies.lock
          rm -rf managed_components

      - name: esp-idf build
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ inputs.esp_idf_version }}
          target: esp32
          command: |
            idf.py build
            python -m esptool --chip esp32 merge_bin \
              --flash_mode dio \
              --flash_freq 80m \
              --flash_size 16MB \
              -o build/previoustube-combined.bin \
              0x1000 build/bootloader/bootloader.bin \
              0x8000 build/partition_table/partition-table.bin \
              0x10000 build/previoustube.bin \
              0x910000 build/spiffs.bin

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: previoustube-firmware
          path: |
            build/previoustube-combined.bin
          if-no-files-found: error
